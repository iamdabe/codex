name: Publish Test Sample

on:
  push:
    branches:
      - main
    paths:
      - samples/**
      - wwwroot/**
      - .github/workflows/github-pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build static site artifact
        run: |
          set -euo pipefail

          rm -rf _site
          mkdir -p _site

          # Start with the sample page as the site root.
          cp samples/index.html _site/index.html

          # Rewrite sample-relative references so they resolve on GitHub Pages.
          sed -i 's|../../wwwroot/|./wwwroot/|g' _site/index.html

          # Copy explicitly known build outputs.
          mkdir -p _site/wwwroot
          cp wwwroot/blazer-markdown-editor.css _site/wwwroot/blazer-markdown-editor.css
          cp wwwroot/blazer-markdown-editor.js _site/wwwroot/blazer-markdown-editor.js
          cp wwwroot/blazer-markdown-editor.js.map _site/wwwroot/blazer-markdown-editor.js.map

          # Copy any additional local src/href references used by the sample.
          grep -Eo '(src|href)="[^"]+"' _site/index.html \
            | sed -E 's/^(src|href)="([^"]+)"$/\2/' \
            | grep -Ev '^(https?:|//|#|data:|mailto:|tel:|javascript:)' \
            | while IFS= read -r ref; do
                ref="${ref#./}"
                [ -n "$ref" ] || continue
                [ -f "$ref" ] || continue
                mkdir -p "_site/$(dirname "$ref")"
                cp "$ref" "_site/$ref"
              done

          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
