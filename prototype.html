<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Markdown Editor — Blazor Prototype</title>
<link rel="stylesheet" href="https://prosemirror.net/css/editor.css">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  body {
    font-family: system-ui, -apple-system, sans-serif;
    margin: 0; padding: 32px;
    background: #f8f9fa; color: #1a1a1a;
  }
  .editor-wrapper { max-width: 760px; margin: 0 auto; }

  /* ── Editor surface ── */
  .ProseMirror {
    background: #fff;
    border: 1px solid #d0d0d0;
    border-radius: 6px;
    padding: 16px 20px;
    min-height: 300px;
    font-size: 15px;
    line-height: 1.65;
    outline: none;
  }
  .ProseMirror:focus { border-color: #999; }

  /* ── Code view textarea ── */
  #code-view {
    display: none;
    width: 100%;
    min-height: 300px;
    border: 1px solid #d0d0d0;
    border-radius: 6px;
    padding: 16px 20px;
    font-family: 'SF Mono','Fira Code','Consolas', monospace;
    font-size: 13px;
    line-height: 1.6;
    color: #1a1a1a;
    background: #fff;
    resize: vertical;
    outline: none;
    tab-size: 4;
  }
  #code-view:focus { border-color: #999; }

  /* ── Tables ── */
  .ProseMirror table { border-collapse: collapse; margin: 12px 0; width: auto; }
  .ProseMirror td, .ProseMirror th {
    border: 1px solid #d0d0d0;
    padding: 6px 12px; min-width: 60px;
    vertical-align: top; position: relative;
  }
  .ProseMirror th { background: #f5f5f5; font-weight: 600; }
  .ProseMirror .selectedCell { background: #d4e5ff; }
  .ProseMirror .column-resize-handle {
    position: absolute; right: -2px; top: 0; bottom: 0;
    width: 4px; z-index: 20; background: #adf; cursor: col-resize;
  }
  .ProseMirror hr { border: none; border-top: 2px solid #d0d0d0; margin: 16px 0; }

  /* ── Code blocks ── */
  .ProseMirror pre {
    background: #f5f5f5; padding: 12px 16px;
    border-radius: 4px; font-family: 'SF Mono','Fira Code','Consolas',monospace;
    font-size: 13px; line-height: 1.5; overflow-x: auto;
  }
  .ProseMirror code {
    background: #f0f0f0; padding: 1px 4px; border-radius: 3px;
    font-family: 'SF Mono','Fira Code','Consolas',monospace; font-size: 0.9em;
  }
  .ProseMirror pre code { background: none; padding: 0; }

  /* ── Blockquotes ── */
  .ProseMirror blockquote {
    border-left: 3px solid #d0d0d0;
    margin: 8px 0; padding: 4px 16px; color: #555;
  }

  /* ── Floating table toolbar ── */
  .table-toolbar {
    position: absolute; z-index: 100;
    background: #fff; border: 1px solid #d0d0d0;
    border-radius: 8px;
    box-shadow: 0 4px 16px rgba(0,0,0,.1);
    padding: 4px; display: flex; gap: 2px;
  }
  .table-toolbar button {
    padding: 4px 8px; border: none; background: none;
    border-radius: 4px; cursor: pointer; font-size: 12px;
    white-space: nowrap; color: #333; font-family: inherit;
  }
  .table-toolbar button:hover { background: #f0f0ff; }
  .table-toolbar .sep { width: 1px; background: #e0e0e0; margin: 2px 3px; }
  .table-toolbar .danger:hover { background: #fff0f0; color: #c00; }

  /* ── Slash menu ── */
  .slash-menu {
    position: absolute; z-index: 100;
    background: #fff; border: 1px solid #d0d0d0;
    border-radius: 8px;
    box-shadow: 0 4px 16px rgba(0,0,0,.12);
    padding: 4px; min-width: 220px;
    max-height: 320px; overflow-y: auto;
  }
  .slash-menu-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px; border-radius: 5px; cursor: pointer; font-size: 14px;
  }
  .slash-menu-item:hover, .slash-menu-item.active { background: #f0f0ff; }
  .slash-menu-item .icon {
    width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    background: #f0f0f0; border-radius: 5px; font-size: 15px; flex-shrink: 0;
  }
  .slash-menu-item .label { font-weight: 500; }
  .slash-menu-item .desc  { font-size: 12px; color: #888; }

  /* ── Bottom bar ── */
  .bottom-bar {
    margin-top: 12px;
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  }

  /* Mode toggle */
  .mode-toggle {
    display: inline-flex; border: 1px solid #d0d0d0; border-radius: 6px; overflow: hidden;
  }
  .mode-toggle button {
    padding: 5px 14px; border: none; background: #fff;
    font-size: 13px; font-family: inherit; cursor: pointer;
    color: #666; transition: all .15s;
  }
  .mode-toggle button:not(:last-child) { border-right: 1px solid #d0d0d0; }
  .mode-toggle button.active { background: #1a1a1a; color: #fff; }
  .mode-toggle button:hover:not(.active) { background: #f0f0f0; }

  button.action-btn {
    padding: 5px 14px; border: 1px solid #d0d0d0; border-radius: 6px;
    background: #fff; cursor: pointer; font-size: 13px; font-family: inherit; color: #666;
  }
  button.action-btn:hover { background: #f0f0f0; }

  .hint {
    font-size: 12px; color: #999; line-height: 1.5; flex: 1; min-width: 200px;
  }
  .hint code { background: #f0f0f0; padding: 1px 4px; border-radius: 3px; font-size: 11px; }
  .hint b { font-weight: 600; color: #777; }
</style>

<body>

<div class="editor-wrapper">
  <div id="editor"></div>
  <textarea id="code-view" spellcheck="false"></textarea>

  <div class="bottom-bar">
    <div class="mode-toggle">
      <button id="btn-live" class="active">Live</button>
      <button id="btn-code">Code</button>
    </div>
    <button class="action-btn" id="btn-export">Export Markdown</button>
    <span class="hint">
      Type <code>/</code> for commands ·
      <code>**bold**</code> · <code>*italic*</code> · 
      <code># </code> heading · <code>> </code> quote ·

<script type="module">
// ═══════════════════════════════════════════════════════════════════
//  IMPORTS
// ═══════════════════════════════════════════════════════════════════
import { Schema, Slice }                   from "prosemirror-model";
import { EditorState, Plugin, PluginKey,
         Selection, TextSelection }        from "prosemirror-state";
import { EditorView }                      from "prosemirror-view";
import { keymap }                          from "prosemirror-keymap";
import { history, undo, redo }             from "prosemirror-history";
import { InputRule, inputRules,
         wrappingInputRule, textblockTypeInputRule }
                                               from "prosemirror-inputrules";
import { dropCursor }                      from "prosemirror-dropcursor";
import { gapCursor }                       from "prosemirror-gapcursor";
import {
  schema as mdSchema,
  defaultMarkdownSerializer,
  MarkdownSerializer
} from "prosemirror-markdown";
import {
  tableNodes, columnResizing, tableEditing, goToNextCell,
  addColumnAfter, addColumnBefore, deleteColumn,
  addRowAfter, addRowBefore, deleteRow, deleteTable
} from "prosemirror-tables";
import { setBlockType, wrapIn, chainCommands,
         exitCode, newlineInCode,
         baseKeymap }                      from "prosemirror-commands";
import { wrapInList }                      from "prosemirror-schema-list";
import markdownit                          from "markdown-it";


// ═══════════════════════════════════════════════════════════════════
//  1. SCHEMA  (markdown + tables)
// ═══════════════════════════════════════════════════════════════════
const tNodes = tableNodes({
  tableGroup: "block",
  cellContent: "block+",
  cellAttributes: {
    alignment: {
      default: null,
      getFromDOM: dom => dom.style && dom.style.textAlign || null,
      setDOMAttr(v, a) { if (v) a.style = (a.style||"") + `text-align:${v};`; }
    }
  }
});

let nodes = mdSchema.spec.nodes;
for (const [n, s] of Object.entries(tNodes)) nodes = nodes.update(n, s);
const mySchema = new Schema({ nodes, marks: mdSchema.spec.marks });


// ═══════════════════════════════════════════════════════════════════
//  2. MARKDOWN-IT
// ═══════════════════════════════════════════════════════════════════
const md = markdownit("default", { html: false });


// ═══════════════════════════════════════════════════════════════════
//  3. PARSER  — markdown → ProseMirror doc
// ═══════════════════════════════════════════════════════════════════
function parseMarkdown(src) {
  return buildDoc(md.parse(src || "", {}));
}

function buildDoc(tokens) {
  const stack = [{ type: "doc", attrs: null, children: [] }];
  const top  = () => stack[stack.length - 1];
  const push = n  => top().children.push(n);

  for (const t of tokens) {
    if (t.type === "paragraph_open")    { stack.push({ type:"paragraph",   attrs:null, children:[] }); continue; }
    if (t.type === "heading_open")      { stack.push({ type:"heading",     attrs:{level:+t.tag.slice(1)}, children:[] }); continue; }
    if (t.type === "blockquote_open")   { stack.push({ type:"blockquote",  attrs:null, children:[] }); continue; }
    if (t.type === "bullet_list_open")  { stack.push({ type:"bullet_list", attrs:null, children:[] }); continue; }
    if (t.type === "ordered_list_open") { stack.push({ type:"ordered_list",attrs:{order:+(t.attrGet&&t.attrGet("start"))||1}, children:[] }); continue; }
    if (t.type === "list_item_open")    { stack.push({ type:"list_item",   attrs:null, children:[] }); continue; }
    if (t.type === "table_open")        { stack.push({ type:"table",       attrs:null, children:[] }); continue; }
    if (t.type === "tr_open")           { stack.push({ type:"table_row",   attrs:null, children:[] }); continue; }
    if (t.type === "thead_open" || t.type === "tbody_open") continue;
    if (t.type === "th_open" || t.type === "td_open") {
      const sty = t.attrGet && t.attrGet("style") || "";
      const m = sty.match(/text-align:\s*(\w+)/);
      stack.push({ type: t.type==="th_open" ? "table_header" : "table_cell",
                   attrs: { alignment: m ? m[1] : null }, children: [] });
      continue;
    }

    if (t.type === "thead_close" || t.type === "tbody_close") continue;

    if (t.type === "paragraph_close") { const f=stack.pop(); push(mySchema.node("paragraph",null,inlineNodes(f.children))); continue; }
    if (t.type === "heading_close")   { const f=stack.pop(); push(mySchema.node("heading",f.attrs,inlineNodes(f.children))); continue; }
    if (t.type === "blockquote_close"){ const f=stack.pop(); push(mySchema.node("blockquote",null,f.children.length?f.children:[mySchema.node("paragraph")])); continue; }
    if (t.type === "bullet_list_close") { const f=stack.pop(); push(mySchema.node("bullet_list",null,f.children)); continue; }
    if (t.type === "ordered_list_close"){ const f=stack.pop(); push(mySchema.node("ordered_list",f.attrs,f.children)); continue; }
    if (t.type === "list_item_close")   { const f=stack.pop(); push(mySchema.node("list_item",null,f.children.length?f.children:[mySchema.node("paragraph")])); continue; }
    if (t.type === "table_close")       { const f=stack.pop(); push(mySchema.node("table",null,f.children)); continue; }
    if (t.type === "tr_close")          { const f=stack.pop(); push(mySchema.node("table_row",null,f.children)); continue; }
    if (t.type === "th_close" || t.type === "td_close") {
      const f=stack.pop();
      const nt = f.type==="table_header" ? "table_header" : "table_cell";
      const il = inlineNodes(f.children);
      push(mySchema.node(nt, f.attrs, il.length ? [mySchema.node("paragraph",null,il)] : [mySchema.node("paragraph")]));
      continue;
    }

    if (t.type === "fence" || t.type === "code_block") {
      const txt = (t.content||"").replace(/\n$/,"");
      push(mySchema.node("code_block", null, txt ? [mySchema.text(txt)] : []));
      continue;
    }
    if (t.type === "hr") { push(mySchema.node("horizontal_rule")); continue; }
    if (t.type === "inline" && t.children) { top().children.push(...t.children); continue; }
  }

  const doc = stack[0];
  return mySchema.node("doc", null, doc.children.length ? doc.children : [mySchema.node("paragraph")]);
}

function inlineNodes(tokens) {
  if (!tokens || !tokens.length) return [];
  const out = [], marks = [];
  for (const t of tokens) {
    if (t.type === "text" && t.content) out.push(mySchema.text(t.content, marks.slice()));
    else if (t.type === "code_inline")  out.push(mySchema.text(t.content, [...marks, mySchema.marks.code.create()]));
    else if (t.type === "strong_open")  marks.push(mySchema.marks.strong.create());
    else if (t.type === "strong_close") marks.splice(marks.findIndex(m => m.type===mySchema.marks.strong), 1);
    else if (t.type === "em_open")      marks.push(mySchema.marks.em.create());
    else if (t.type === "em_close")     marks.splice(marks.findIndex(m => m.type===mySchema.marks.em), 1);
    else if (t.type === "link_open")    marks.push(mySchema.marks.link.create({
      href:(t.attrGet&&t.attrGet("href"))||"", title:(t.attrGet&&t.attrGet("title"))||"" }));
    else if (t.type === "link_close")   marks.splice(marks.findIndex(m => m.type===mySchema.marks.link), 1);
    else if (t.type === "softbreak")    out.push(mySchema.text("\n", marks.slice()));
    else if (t.type === "hardbreak")    out.push(mySchema.node("hard_break"));
    else if (t.type === "image")        out.push(mySchema.node("image", {
      src:(t.attrGet&&t.attrGet("src"))||"", alt:t.content||"",
      title:(t.attrGet&&t.attrGet("title"))||null }));
  }
  return out;
}


// ═══════════════════════════════════════════════════════════════════
//  4. SERIALIZER  — ProseMirror doc → markdown string
// ═══════════════════════════════════════════════════════════════════
function cellText(cell) {
  let t = ""; cell.descendants(n => { if (n.isText) t += n.text; }); return t.trim();
}

const mySerializer = new MarkdownSerializer(
  {
    ...defaultMarkdownSerializer.nodes,
    table(state, node) {
      const rows = []; node.forEach(r => rows.push(r));
      if (!rows.length) return;
      const cols = rows[0].childCount;
      const aligns = [];
      for (let c = 0; c < cols; c++) aligns.push(rows[0].child(c).attrs.alignment || null);
      const grid = rows.map(row => {
        const cells = [];
        for (let c = 0; c < row.childCount; c++) cells.push(cellText(row.child(c)));
        return cells;
      });
      const widths = new Array(cols).fill(3);
      for (const row of grid) row.forEach((c,i) => { if(i<cols) widths[i] = Math.max(widths[i], c.length); });
      const pad = (s,w) => s + " ".repeat(Math.max(0, w - s.length));

      state.write("| " + grid[0].map((c,i) => pad(c, widths[i])).join(" | ") + " |\n");
      state.write("| " + widths.map((w,i) => {
        const a = aligns[i];
        if (a==="center") return ":"+"-".repeat(w)+":";
        if (a==="right")  return "-".repeat(w)+":";
        return "-".repeat(w+1);
      }).join(" | ") + " |\n");
      for (let r = 1; r < grid.length; r++)
        state.write("| " + grid[r].map((c,i) => pad(c, widths[i])).join(" | ") + " |\n");
      state.closeBlock(node);
    },
    table_row(){}, table_cell(){}, table_header(){},
  },
  defaultMarkdownSerializer.marks
);


// ═══════════════════════════════════════════════════════════════════
//  5. INLINE MARKDOWN INPUT RULES
// ═══════════════════════════════════════════════════════════════════
const inlineMarkdownRules = inputRules({ rules: [
  // **bold**
  new InputRule(/\*\*([^\s*](?:[^*]*[^\s*])?)\*\*$/, (state, match, start, end) => {
    if (!match[1]) return null;
    return state.tr.replaceWith(start, end, mySchema.text(match[1], [mySchema.marks.strong.create()]));
  }),
  // __bold__
  new InputRule(/__([^\s_](?:[^_]*[^\s_])?)__$/, (state, match, start, end) => {
    if (!match[1]) return null;
    return state.tr.replaceWith(start, end, mySchema.text(match[1], [mySchema.marks.strong.create()]));
  }),
  // *italic* (prefix char to avoid matching **)
  new InputRule(/(?:^|[^*])\*([^\s*](?:[^*]*[^\s*])?)\*$/, (state, match, start, end) => {
    if (!match[1]) return null;
    const from = start + (match[0].length > match[1].length + 2 ? 1 : 0);
    return state.tr.replaceWith(from, end, mySchema.text(match[1], [mySchema.marks.em.create()]));
  }),
  // _italic_
  new InputRule(/(?:^|[^_])_([^\s_](?:[^_]*[^\s_])?)_$/, (state, match, start, end) => {
    if (!match[1]) return null;
    const from = start + (match[0].length > match[1].length + 2 ? 1 : 0);
    return state.tr.replaceWith(from, end, mySchema.text(match[1], [mySchema.marks.em.create()]));
  }),
  // `code`
  new InputRule(/`([^`]+)`$/, (state, match, start, end) => {
    if (!match[1]) return null;
    return state.tr.replaceWith(start, end, mySchema.text(match[1], [mySchema.marks.code.create()]));
  }),
]});


// ═══════════════════════════════════════════════════════════════════
//  6. TABLE INPUT RULE
//     Detects:  | header | header |
//               | --- | --- |       <-- triggers on this line
// ═══════════════════════════════════════════════════════════════════
function tableInputRulePlugin() {
  return new Plugin({
    props: {
      handleTextInput(view, from, to, text) {
        // We only care when user finishes typing something that could be a separator line
        return false; // We'll handle this in handleKeyDown for Enter
      },
      handleKeyDown(view, event) {
        // Support Enter and Ctrl/Cmd+Enter for table conversion.
        // Some workflows use Ctrl+Enter as an explicit "apply" action.
        if (event.key !== "Enter") return false;

        const { state } = view;
        const { $head } = state.selection;
        const parentNode = $head.parent;

        // Only in paragraphs
        if (parentNode.type.name !== "paragraph") return false;

        const currentLine = parentNode.textContent;

        // Check if the current line is a table separator: | --- | --- | ...
        const sepMatch = currentLine.match(/^\s*\|[\s:]*-{3,}[\s:]*(?:\|[\s:]*-{3,}[\s:]*)+\|?\s*$/);
        if (!sepMatch) return false;

        // Get the previous sibling to find the header line
        const parentPos = $head.before($head.depth);
        const grandParent = $head.node($head.depth - 1);
        let headerBlock = null;
        let headerBlockPos = null;

        // Find the paragraph right before this one
        const myIndex = $head.index($head.depth - 1);
        if (myIndex === 0) return false;

        headerBlock = grandParent.child(myIndex - 1);
        if (headerBlock.type.name !== "paragraph") return false;

        const headerText = headerBlock.textContent;

        // Check if header line looks like a table row: | something | something |
        if (!headerText.match(/^\s*\|.+\|/)) return false;

        // Parse header cells
        const headerCells = headerText
          .replace(/^\s*\|/, "").replace(/\|\s*$/, "")
          .split("|").map(c => c.trim());

        // Parse separator to get alignments
        const sepCells = currentLine
          .replace(/^\s*\|/, "").replace(/\|\s*$/, "")
          .split("|").map(c => c.trim());

        if (headerCells.length < 2) return false;
        if (sepCells.length !== headerCells.length) return false;

        // Determine alignments
        const aligns = sepCells.map(s => {
          const left = s.startsWith(":");
          const right = s.endsWith(":");
          if (left && right) return "center";
          if (right) return "right";
          return null; // left (default)
        });

        // Build table node
        const headerRow = mySchema.nodes.table_row.create(null,
          headerCells.map((text, i) => {
            const content = text ? [mySchema.node("paragraph", null, [mySchema.text(text)])]
                                 : [mySchema.node("paragraph")];
            return mySchema.nodes.table_header.create({ alignment: aligns[i] || null }, content);
          })
        );

        const emptyRow = mySchema.nodes.table_row.create(null,
          headerCells.map((_, i) =>
            mySchema.nodes.table_cell.create({ alignment: aligns[i] || null }, [mySchema.node("paragraph")])
          )
        );

        const table = mySchema.nodes.table.create(null, [headerRow, emptyRow]);

        // Replace both paragraphs (header + separator) with the table
        // Find positions of the header paragraph and current (separator) paragraph
        let headerStart = $head.before($head.depth - 1);
        // Walk to find the start of the header paragraph
        let pos = headerStart;
        for (let i = 0; i < myIndex - 1; i++) {
          pos += grandParent.child(i).nodeSize;
        }
        const hStart = pos;
        const sepEnd = hStart + headerBlock.nodeSize + parentNode.nodeSize;

        const tr = state.tr.replaceWith(hStart, sepEnd, table);
        view.dispatch(tr);
        event.preventDefault();
        return true;
      }
    }
  });
}


// ═══════════════════════════════════════════════════════════════════
//  7. CODE BLOCK ESCAPE
//     Enter on empty last line exits the code block
//     Arrow-down at end of code block exits too
// ═══════════════════════════════════════════════════════════════════
function codeBlockEscapeKeymap() {
  return keymap({
    "Enter": (state, dispatch) => {
      const { $head } = state.selection;
      if ($head.parent.type.name !== "code_block") return false;

      const codeBlock = $head.parent;
      const text = codeBlock.textContent;
      const cursorAtEnd = $head.parentOffset === codeBlock.content.size;

      // If cursor is at the end and text ends with a newline (empty last line)
      if (cursorAtEnd && text.endsWith("\n")) {
        if (dispatch) {
          // Remove the trailing newline
          const codeBlockPos = $head.before($head.depth);
          const tr = state.tr;

          // Delete the trailing newline
          tr.delete(codeBlockPos + codeBlock.content.size, codeBlockPos + codeBlock.content.size + 1);

          // Insert a new paragraph after the code block
          const afterPos = codeBlockPos + codeBlock.nodeSize - 1; // -1 because we deleted a char
          const para = mySchema.node("paragraph");
          tr.insert(afterPos, para);

          // Move cursor to the new paragraph
          tr.setSelection(TextSelection.near(tr.doc.resolve(afterPos + 1)));
          dispatch(tr);
        }
        return true;
      }
      return false;
    },

    "ArrowDown": (state, dispatch) => {
      const { $head } = state.selection;
      if ($head.parent.type.name !== "code_block") return false;

      const cursorAtEnd = $head.parentOffset === $head.parent.content.size;
      if (!cursorAtEnd) return false;

      // Move to next block if possible
      const after = $head.after($head.depth);
      if (after < state.doc.content.size) {
        if (dispatch) {
          dispatch(state.tr.setSelection(TextSelection.near(state.doc.resolve(after + 1))));
        }
        return true;
      } else {
        // At end of document — create a new paragraph
        if (dispatch) {
          const tr = state.tr;
          tr.insert(state.doc.content.size, mySchema.node("paragraph"));
          tr.setSelection(TextSelection.near(tr.doc.resolve(tr.doc.content.size - 1)));
          dispatch(tr);
        }
        return true;
      }
    },
  });
}


// ═══════════════════════════════════════════════════════════════════
//  8. PASTE HANDLER — detects markdown, parses it
// ═══════════════════════════════════════════════════════════════════
function pastePlugin() {
  return new Plugin({
    props: {
      handlePaste(view, event) {
        const text = event.clipboardData && event.clipboardData.getData("text/plain");
        if (!text) return false;

        const looksLikeMarkdown =
          /^#{1,6}\s/m.test(text) ||
          /\*\*[^*]+\*\*/m.test(text) ||
          /^\s*[-*+]\s/m.test(text) ||
          /^\s*\d+\.\s/m.test(text) ||
          /^\s*>/m.test(text) ||
          /\|.+\|.+\|/m.test(text) ||
          /^```/m.test(text) ||
          /^---\s*$/m.test(text);

        if (!looksLikeMarkdown) return false;

        const doc = parseMarkdown(text);
        view.dispatch(view.state.tr.replaceSelection(new Slice(doc.content, 0, 0)));
        return true;
      }
    }
  });
}


// ═══════════════════════════════════════════════════════════════════
//  9. FLOATING TABLE TOOLBAR
// ═══════════════════════════════════════════════════════════════════
function tableToolbarPlugin() {
  let toolbarEl = null;

  function createToolbar() {
    const el = document.createElement("div");
    el.className = "table-toolbar";
    el.innerHTML = `
      <button data-cmd="addColumnBefore" title="Insert column left">⇐ Col</button>
      <button data-cmd="addColumnAfter"  title="Insert column right">Col ⇒</button>
      <div class="sep"></div>
      <button data-cmd="addRowBefore" title="Insert row above">⇑ Row</button>
      <button data-cmd="addRowAfter"  title="Insert row below">Row ⇓</button>
      <div class="sep"></div>
      <button data-cmd="deleteColumn" class="danger" title="Delete column">✕ Col</button>
      <button data-cmd="deleteRow"    class="danger" title="Delete row">✕ Row</button>
      <div class="sep"></div>
      <button data-cmd="deleteTable"  class="danger" title="Delete table">✕ Table</button>
    `;
    el.style.display = "none";
    document.body.appendChild(el);
    return el;
  }

  const cmds = { addColumnBefore, addColumnAfter, deleteColumn,
                 addRowBefore, addRowAfter, deleteRow, deleteTable };

  return new Plugin({
    view(editorView) {
      toolbarEl = createToolbar();
      toolbarEl.addEventListener("mousedown", e => {
        e.preventDefault();
        const btn = e.target.closest("button[data-cmd]");
        if (btn) { const c = cmds[btn.dataset.cmd]; if(c) c(editorView.state, editorView.dispatch); }
      });
      return {
        update(view) {
          const $h = view.state.selection.$head;
          let inTbl = false, tblDom = null;
          for (let d = $h.depth; d > 0; d--) {
            if ($h.node(d).type.name === "table") {
              inTbl = true;
              tblDom = view.nodeDOM($h.before(d));
              break;
            }
          }
          if (!inTbl || !tblDom) { toolbarEl.style.display = "none"; return; }
          const r = tblDom.getBoundingClientRect();
          toolbarEl.style.display = "flex";
          toolbarEl.style.left = r.left + "px";
          toolbarEl.style.top  = (r.top - toolbarEl.offsetHeight - 6 + window.scrollY) + "px";
        },
        destroy() { if (toolbarEl) toolbarEl.remove(); }
      };
    }
  });
}


// ═══════════════════════════════════════════════════════════════════
//  10. SLASH COMMAND MENU
// ═══════════════════════════════════════════════════════════════════
const slashKey = new PluginKey("slashMenu");
const SLASH_ITEMS = [
  { label:"Heading 1",     icon:"H1", desc:"Big section heading",
    action:(s,d) => setBlockType(mySchema.nodes.heading,{level:1})(s,d) },
  { label:"Heading 2",     icon:"H2", desc:"Medium heading",
    action:(s,d) => setBlockType(mySchema.nodes.heading,{level:2})(s,d) },
  { label:"Heading 3",     icon:"H3", desc:"Small heading",
    action:(s,d) => setBlockType(mySchema.nodes.heading,{level:3})(s,d) },
  { label:"Paragraph",     icon:"¶",  desc:"Plain text",
    action:(s,d) => setBlockType(mySchema.nodes.paragraph)(s,d) },
  { label:"Bullet List",   icon:"•",  desc:"Unordered list",
    action:(s,d) => wrapInList(mySchema.nodes.bullet_list)(s,d) },
  { label:"Numbered List", icon:"1.", desc:"Ordered list",
    action:(s,d) => wrapInList(mySchema.nodes.ordered_list)(s,d) },
  { label:"Blockquote",    icon:"❝",  desc:"Quote block",
    action:(s,d) => wrapIn(mySchema.nodes.blockquote)(s,d) },
  { label:"Code Block",    icon:"<>", desc:"Fenced code block",
    action:(s,d) => setBlockType(mySchema.nodes.code_block)(s,d) },
  { label:"Divider",       icon:"―",  desc:"Horizontal rule",
    action:(s,d) => { if(d) d(s.tr.replaceSelectionWith(mySchema.nodes.horizontal_rule.create())); return true; } },
  { label:"Table",         icon:"▦",  desc:"Insert 3×3 table",
    action:(s,d) => {
      if (!d) return true;
      const hdr = () => mySchema.nodes.table_header.createAndFill();
      const cel = () => mySchema.nodes.table_cell.createAndFill();
      d(s.tr.replaceSelectionWith(
        mySchema.nodes.table.create(null,[
          mySchema.nodes.table_row.create(null,[hdr(),hdr(),hdr()]),
          mySchema.nodes.table_row.create(null,[cel(),cel(),cel()]),
          mySchema.nodes.table_row.create(null,[cel(),cel(),cel()]),
        ])
      ));
      return true;
    } },
  { label:"Image",         icon:"🖼", desc:"Insert image URL",
    action:(s,d) => {
      const src = prompt("Image URL:");
      if (!src) return false;
      const alt = prompt("Alt text:","") || "";
      if(d) d(s.tr.replaceSelectionWith(mySchema.nodes.image.create({src,alt,title:null})));
      return true;
    } },
];

function slashMenuPlugin() {
  let menuEl = null, activeIdx = 0, filterText = "", slashPos = null;
  const filtered = () => {
    const q = filterText.toLowerCase();
    return SLASH_ITEMS.filter(it => it.label.toLowerCase().includes(q));
  };
  function destroy() {
    if (menuEl) { menuEl.remove(); menuEl = null; }
    slashPos = null; filterText = ""; activeIdx = 0;
  }
  function render(view) {
    const items = filtered();
    if (!items.length) { destroy(); return; }
    if (!menuEl) { menuEl = document.createElement("div"); menuEl.className = "slash-menu"; document.body.appendChild(menuEl); }
    const coords = view.coordsAtPos(view.state.selection.from);
    menuEl.style.left = coords.left + "px";
    menuEl.style.top  = (coords.bottom + 4) + "px";
    activeIdx = Math.min(activeIdx, items.length - 1);
    menuEl.innerHTML = items.map((it, i) =>
      `<div class="slash-menu-item${i===activeIdx?" active":""}" data-i="${i}">
        <span class="icon">${it.icon}</span>
        <span><span class="label">${it.label}</span><br><span class="desc">${it.desc}</span></span>
      </div>`
    ).join("");
    menuEl.querySelectorAll(".slash-menu-item").forEach(el => {
      el.addEventListener("mousedown", e => { e.preventDefault(); execute(view, items[+el.dataset.i]); });
    });
  }
  function execute(view, item) {
    view.dispatch(view.state.tr.delete(slashPos, view.state.selection.from));
    destroy();
    item.action(view.state, view.dispatch, view);
    view.focus();
  }
  return new Plugin({
    key: slashKey,
    props: {
      handleKeyDown(view, e) {
        if (!menuEl) return false;
        const items = filtered();
        if (e.key==="ArrowDown") { e.preventDefault(); activeIdx=(activeIdx+1)%items.length; render(view); return true; }
        if (e.key==="ArrowUp")   { e.preventDefault(); activeIdx=(activeIdx-1+items.length)%items.length; render(view); return true; }
        if (e.key==="Enter")     { e.preventDefault(); if(items[activeIdx]) execute(view,items[activeIdx]); return true; }
        if (e.key==="Escape")    { destroy(); return true; }
        return false;
      },
      handleTextInput(view, from, to, text) {
        if (text === "/" && !menuEl) {
          const $f = view.state.doc.resolve(from);
          const before = $f.parent.textBetween(0, $f.parentOffset, null, "\ufffc");
          if (!before.length || /\s$/.test(before))
            setTimeout(() => { slashPos = from; filterText = ""; activeIdx = 0; render(view); }, 0);
        }
        return false;
      },
    },
    view() {
      return {
        update(view) {
          if (!menuEl || slashPos === null) return;
          const { from } = view.state.selection;
          if (from <= slashPos) { destroy(); return; }
          filterText = view.state.doc.textBetween(slashPos + 1, from, "", "\ufffc");
          render(view);
        },
        destroy() { if (menuEl) menuEl.remove(); }
      };
    }
  });
}


// ═══════════════════════════════════════════════════════════════════
//  11. CREATE EDITOR
// ═══════════════════════════════════════════════════════════════════
const initialMarkdown = `# Markdown Editor

This is a **rich text** markdown editor with full markdown support.

## Text Formatting

**Bold text**, *italic text*, and \`inline code\`.

You *can **combine** them* freely.

## Lists

### Unordered

* Item 1
* Item 2
    * Nested item a
    * Nested item b
* Item 3

### Ordered

1. First
2. Second
3. Third
    1. Sub-item
    2. Sub-item

## Links & Images

Visit [Markdown Live Preview](https://markdownlivepreview.com/).

## Blockquotes

> Markdown is a lightweight markup language with plain-text-formatting syntax.
>
> > This is a **nested** blockquote inside the outer one.

## Table

| Left columns  | Center column | Right column  |
| ------------- |:-------------:| -------------:|
| left foo      | center foo    | right foo     |
| left bar      | center bar    | right bar     |
| left baz      | center baz    | right baz     |

## Code Block

\`\`\`
let message = 'Hello world';
alert(message);
\`\`\`

---

Type \`/\` at the start of a line to open the **slash command menu**!
`;

const initialDoc = parseMarkdown(initialMarkdown);

// Build block-level markdown input rules without smart typography
function buildBlockInputRules(schema) {
  const rules = [];
  if (schema.nodes.blockquote) rules.push(wrappingInputRule(/^\s*>\s$/, schema.nodes.blockquote));
  if (schema.nodes.ordered_list) rules.push(wrappingInputRule(
    /^(\d+)\.\s$/, schema.nodes.ordered_list,
    match => ({ order: +match[1] }),
    (match, node) => node.childCount + node.attrs.order == +match[1]
  ));
  if (schema.nodes.bullet_list) rules.push(wrappingInputRule(/^\s*([-+*])\s$/, schema.nodes.bullet_list));
  if (schema.nodes.code_block) rules.push(textblockTypeInputRule(/^```$/, schema.nodes.code_block));
  if (schema.nodes.horizontal_rule) rules.push(new InputRule(/^---$/, (state, _m, start, end) =>
    state.tr.replaceWith(start - 1, end, schema.nodes.horizontal_rule.create())
  ));
  if (schema.nodes.heading) rules.push(textblockTypeInputRule(
    /^(#{1,6})\s$/, schema.nodes.heading, match => ({ level: match[1].length })
  ));
  return inputRules({ rules });
}

const plugins = [
  slashMenuPlugin(),   // MUST be first — its Enter handler needs priority when menu is open
  // Must run before baseKeymap Enter (splitBlock), otherwise table conversion never triggers.
  tableInputRulePlugin(),
  history(),
  dropCursor(),
  gapCursor(),
  keymap({
    "Mod-z": undo,
    "Shift-Mod-z": redo,
    "Mod-y": redo,
    "Enter": chainCommands(newlineInCode, exitCode)
  }),
  keymap(baseKeymap),
  buildBlockInputRules(mySchema),
  inlineMarkdownRules,
  codeBlockEscapeKeymap(),
  columnResizing(),
  tableEditing(),
  keymap({ "Tab": goToNextCell(1), "Shift-Tab": goToNextCell(-1) }),
  tableToolbarPlugin(),
  pastePlugin(),
];

const state = EditorState.create({ doc: initialDoc, plugins });
const view  = new EditorView(document.querySelector("#editor"), { state });


// ═══════════════════════════════════════════════════════════════════
//  12. LIVE / CODE TOGGLE
// ═══════════════════════════════════════════════════════════════════
const editorDiv  = document.getElementById("editor");
const codeView   = document.getElementById("code-view");
const btnLive    = document.getElementById("btn-live");
const btnCode    = document.getElementById("btn-code");
let currentMode  = "live";

function switchToCode() {
  currentMode = "code";
  const mdText = mySerializer.serialize(view.state.doc);
  codeView.value = mdText;
  editorDiv.style.display = "none";
  codeView.style.display  = "block";
  btnLive.classList.remove("active");
  btnCode.classList.add("active");
  codeView.focus();
}

function switchToLive() {
  currentMode = "live";
  const doc = parseMarkdown(codeView.value);
  view.updateState(EditorState.create({ doc, plugins: view.state.plugins }));
  codeView.style.display  = "none";
  editorDiv.style.display = "block";
  btnCode.classList.remove("active");
  btnLive.classList.add("active");
  view.focus();
}

btnCode.addEventListener("click", switchToCode);
btnLive.addEventListener("click", switchToLive);


// ═══════════════════════════════════════════════════════════════════
//  13. EXPORT BUTTON
// ═══════════════════════════════════════════════════════════════════
document.getElementById("btn-export").addEventListener("click", () => {
  const mdText = currentMode === "live"
    ? mySerializer.serialize(view.state.doc)
    : codeView.value;

  // Copy to clipboard
  navigator.clipboard.writeText(mdText).then(() => {
    const btn = document.getElementById("btn-export");
    const orig = btn.textContent;
    btn.textContent = "Copied!";
    setTimeout(() => btn.textContent = orig, 1500);
  }).catch(() => {
    // Fallback: show in alert
    prompt("Markdown:", mdText);
  });
});


// ═══════════════════════════════════════════════════════════════════
//  14. BLAZOR JS INTEROP
// ═══════════════════════════════════════════════════════════════════
window.markdownEditor = {
  getMarkdown: () => currentMode === "live"
    ? mySerializer.serialize(view.state.doc)
    : codeView.value,
  setMarkdown: md => {
    if (currentMode === "live") {
      const doc = parseMarkdown(md);
      view.updateState(EditorState.create({ doc, plugins: view.state.plugins }));
    } else {
      codeView.value = md;
    }
  },
  destroy: () => view.destroy()
};
